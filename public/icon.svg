<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#F0E8DF"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- stylized "P" mark in brand terracotta -->
  <text x="50%" y="54%" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="320" font-weight="600" fill="#C4896F">P</text>
  <!-- subtle script "Charm" -->
  <text x="50%" y="78%" text-anchor="middle"
        font-family="'Dancing Script', 'Snell Roundhand', cursive"
        font-size="64" fill="#8B6F5E">charm</text>
</svg>
